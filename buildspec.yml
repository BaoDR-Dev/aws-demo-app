version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws --version
      - aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 567681717478.dkr.ecr.ap-southeast-2.amazonaws.com
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t my-demo-app .
      - docker tag my-demo-app:latest 567681717478.dkr.ecr.ap-southeast-2.amazonaws.com/my-demo-app:latest
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker image...
      - docker push 567681717478.dkr.ecr.ap-southeast-2.amazonaws.com/my-demo-app:latest